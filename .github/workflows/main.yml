name: Flet APK Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - dest: checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Install Flet
        run: |
          python3 -m pip install flet

      - name: Build APK
        run: |
          flet build apk --no-docker

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: otoyikama-app-apk
          path: build/apk/*.apk
